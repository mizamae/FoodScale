{% load i18n %}
{% load static %}
{% load crispy_forms_tags %}

<form hx-post="{{ request.path }}" hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}' class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title">{% trans "Registrar peso"%}</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <div class="modal-body">
      <div class="mb-3">
        <label for="{{ form.dateTime.id_for_label }}" class="form-label">{% trans "Fecha" %}</label>
        {{ form.dateTime|as_crispy_field }}
        <div class="invalid-feedback">{{ form.dateTime.errors|first }}</div>
      </div>
      
      <div class="mb-3">
        <label for="{{ form.value.id_for_label }}" class="form-label">{% trans "Medida" %}</label>
        {{ form.value|as_crispy_field }}
        <div class="invalid-feedback">{{ form.value.errors|first }}</div>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
        Cancel
      </button>
      <button type="submit" class="btn btn-primary">{% trans "Guardar" %}</button>
    </div>
  </form>
