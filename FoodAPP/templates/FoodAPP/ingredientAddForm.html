{% load i18n %}
{% load static %}
{% load crispy_forms_tags %}

<form hx-post="{{ request.path }}" hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}' class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title">{% trans "Añadir comida en el dia"%}</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    
    <div class="modal-body">
      <div class="mb-3">
        <label for="{{ form.mealType.id_for_label }}" class="form-label">{% trans "Comida" %}</label>
        {{ form.mealType|as_crispy_field }}
        <div class="invalid-feedback">{{ form.mealType.errors|first }}</div>
      </div>
      
      <div class="mb-3">
        <label for="{{ form.ingredient.id_for_label }}" class="form-label">{% trans "Ingrediente" %}</label>
        <div id="div_id_ingredient" class"mb-3">
          <div class"col-8">
            <div class="input-group">
              <input
                  placeholder="{% trans "Escribe el alimento" %}"
                  class="form-control textinput"
                  type="text"
                  name="ingredientInput"
                  id="id_ingredientInput"
                  hx-get="{% url 'FoodAPP_ingredientAutocomplete' %}"
                  hx-trigger="keyup changed delay:300ms[this.value.length > 0]"
                  hx-target="#ingredient-results"
                  hx-include="#ingredientInput"
                  hx-vals='js:{q: document.getElementById("id_ingredientInput").value}'
                  hx-on:htmx:config-request="if(!this.value.trim()){ event.preventDefault(); }"
                  autocomplete="off"
              >
              <button 
                  class="btn btn-outline-secondary d-none"
                  type="button"
                  id="clear-btn"
                  onclick="clearIngredient()"
              >
                  ✕
              </button>
            </div>
          </div>
        </div>
        <div class="invalid-feedback">{{ form.ingredientInput.errors|first }}</div>
      </div>
      <div id="ingredient-results" ></div>
      
      <div class="mb-3">
        <label for="{{ form.quantity.id_for_label }}" class="form-label">{% trans "Cantidad" %} [g]</label>
        {{ form.quantity|as_crispy_field }}
        <div class="invalid-feedback">{{ form.quantity.errors|first }}</div>
      </div>
      
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
        Cancel
      </button>
      <button type="submit" class="btn btn-primary">{% trans "Guardar" %}</button>
    </div>
  </form>

  <script>
    const results = document.getElementById("ingredient-results");
    const input = document.getElementById("id_ingredientInput");
    const clearBtn = document.getElementById("clear-btn");

    input.addEventListener("input", function () {
        if (input.value.length > 0) {
            clearBtn.classList.remove("d-none");
        } else {
            clearBtn.classList.add("d-none");
            results.innerHTML = "";
        }
    });

    function clearIngredient() {
        
        input.value = "";
        input.focus();

        // dispara evento para que htmx actualice resultados
        //input.dispatchEvent(new Event('keyup'));
    }

    clearBtn.addEventListener("click", function () {
        input.value = "";
        clearBtn.classList.add("d-none");
        results.innerHTML = "";
        input.focus();
    });
</script>
